<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿色家园</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Microsoft YaHei",sans-serif;
            background:#f4fff4;
            color:#333;
            line-height:1.6;
        }

        /* 导航栏 */
        header{
            background:#2e8b57;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
        }

        header h1{
            font-size:30px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-size:18px;
            transition:0.3s;
        }

        nav a:hover{
            color:#d4ffd4;
        }

        /* 横幅区域 */
        .hero{
            height:500px;
            background:linear-gradient(
                rgba(0,0,0,0.4),
                rgba(0,0,0,0.4)
            ),
            url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop');
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:20px;
        }

        .hero-content h2{
            font-size:55px;
            margin-bottom:20px;
        }

        .hero-content p{
            font-size:22px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:14px 35px;
            background:#3cb371;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            background:#2e8b57;
        }

        /* 内容区域 */
        .section{
            padding:70px 10%;
            text-align:center;
        }

        .section h2{
            font-size:40px;
            color:#2e8b57;
            margin-bottom:20px;
        }

        .section p{
            max-width:900px;
            margin:auto;
            font-size:18px;
        }

        /* 卡片区域 */
        .cards{
            display:flex;
            gap:30px;
            margin-top:50px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            background:white;
            width:300px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card h3{
            color:#2e8b57;
            margin-bottom:15px;
            font-size:26px;
        }

        .card p{
            font-size:16px;
        }

        /* 页脚 */
        footer{
            background:#2e8b57;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }

        /* 响应式 */
        @media(max-width:768px){

            .hero-content h2{
                font-size:38px;
            }

            .hero-content p{
                font-size:18px;
            }

            header{
                flex-direction:column;
            }

            nav{
                margin-top:15px;
            }
        }

    </style>
</head>

<body>

    <!-- 导航 -->
    <header>
        <h1>绿色家园</h1>

        <nav>
            <a href="#">首页</a>
            <a href="#">环保知识</a>
            <a href="#">绿色行动</a>
            <a href="#">联系我们</a>
        </nav>
    </header>

    <!-- 横幅 -->
    <section class="hero">
        <div class="hero-content">
            <h2>共建绿色家园</h2>
            <p>
                爱护环境，从你我做起，让地球更加美丽。
            </p>

            <a href="#" class="btn">加入环保行动</a>
        </div>
    </section>

    <!-- 内容 -->
    <section class="section">
        <h2>为什么保护环境？</h2>

        <p>
            环境保护关系到人类未来的发展。减少污染、节约资源、
            低碳生活、绿色出行，都是建设绿色家园的重要方式。
            每一个小小行动，都能为地球带来改变。
        </p>

        <div class="cards">

            <div class="card">
                <h3>🌱 节约能源</h3>
                <p>
                    随手关灯、节约用水、减少浪费，
                    共同守护自然资源。
                </p>
            </div>

            <div class="card">
                <h3>🚴 绿色出行</h3>
                <p>
                    多骑行、多步行、少开车，
                    减少碳排放。
                </p>
            </div>

            <div class="card">
                <h3>♻ 垃圾分类</h3>
                <p>
                    学会垃圾分类与资源回收，
                    让废弃物得到再利用。
                </p>
            </div>

        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>
            © 2026 绿色家园 | 保护环境 人人有责
        </p>
    </footer>

</body>
</html>
